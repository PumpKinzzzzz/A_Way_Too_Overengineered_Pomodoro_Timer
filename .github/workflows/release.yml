name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Add explicit permissions for GITHUB_TOKEN
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      release_upload_url: ${{ steps.create-release.outputs.upload_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Get version from tag
        id: tag_name
        run: echo "current_version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release draft
        id: create-release
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.tag_name.outputs.current_version }}`,
              name: `AWTOPT v${{ steps.tag_name.outputs.current_version }}`,
              body: 'See CHANGELOG.md file for details of this version.',
              draft: true,
              prerelease: false
            })
            return data.id

  build-binaries:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'linux'
            os: 'ubuntu-latest'
            rust_target: 'x86_64-unknown-linux-gnu'
            tauri_target: 'x86_64-unknown-linux-gnu'
            file_extension: ''
            
          - platform: 'windows'
            os: 'windows-latest'  
            rust_target: 'x86_64-pc-windows-msvc'
            tauri_target: 'x86_64-pc-windows-msvc'
            file_extension: '.exe'
            
          - platform: 'macos'
            os: 'macos-latest'
            rust_target: 'x86_64-apple-darwin'
            tauri_target: 'x86_64-apple-darwin'  
            file_extension: ''

          - platform: 'macos-arm'
            os: 'macos-latest'
            rust_target: 'aarch64-apple-darwin'
            tauri_target: 'aarch64-apple-darwin'
            file_extension: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './AWTOPT/package-lock.json'

      - name: Setup Rust  
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './AWTOPT/src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev libglib2.0-dev

      - name: Install frontend dependencies
        working-directory: ./AWTOPT
        run: npm ci

      - name: Build frontend
        working-directory: ./AWTOPT  
        run: npm run build

      - name: Build Tauri app
        working-directory: ./AWTOPT
        run: npm run tauri build -- --target ${{ matrix.tauri_target }}

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.release_upload_url }}
          asset_path: ./AWTOPT/src-tauri/target/${{ matrix.tauri_target }}/release/bundle/appimage/awtopt_*.AppImage
          asset_name: AWTOPT-${{ matrix.platform }}.AppImage
          asset_content_type: application/octet-stream

      - name: Upload Windows artifacts  
        if: matrix.platform == 'windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.release_upload_url }}
          asset_path: ./AWTOPT/src-tauri/target/${{ matrix.tauri_target }}/release/bundle/msi/AWTOPT_*.msi
          asset_name: AWTOPT-${{ matrix.platform }}.msi
          asset_content_type: application/octet-stream

      - name: Upload macOS artifacts (dmg)
        if: contains(matrix.platform, 'macos')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.release_upload_url }}
          asset_path: ./AWTOPT/src-tauri/target/${{ matrix.tauri_target }}/release/bundle/dmg/AWTOPT_*.dmg
          asset_name: AWTOPT-${{ matrix.platform }}.dmg
          asset_content_type: application/octet-stream

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [create-release, build-binaries]
    
    steps:
      - name: Publish release
        id: publish-release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            })

  notify:
    name: Notify Release
    runs-on: ubuntu-latest  
    needs: publish-release
    if: always()
    
    steps:
      - name: Release notification
        run: |
          echo "Release published successfully!"
          echo "Binaries available for Linux, Windows and macOS"
          echo "See: https://github.com/${{ github.repository }}/releases/latest"