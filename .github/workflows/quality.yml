name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:  
    branches: [ main, develop ]
  schedule:
    # Run weekly quality check every Sunday at 2 AM
    - cron: '0 2 * * 0'

# Add explicit permissions
permissions:
  contents: read
  actions: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Code coverage
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    defaults:
      run:
        working-directory: ./AWTOPT/src-tauri
    
    steps:
      - name: Checkout repository  
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './AWTOPT/src-tauri -> target'

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov (optionnel)
        # uses: codecov/codecov-action@v4  
        # with:
        #   file: ./AWTOPT/src-tauri/lcov.info
        #   flags: rust
        #   name: rust-coverage
        run: echo "Coverage report generated at lcov.info"

      - name: Coverage summary
        run: cargo llvm-cov --all-features --workspace --summary-only

  # Performance benchmarks
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    defaults:
      run:
        working-directory: ./AWTOPT/src-tauri
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './AWTOPT/src-tauri -> target'

      - name: Build time benchmark
        run: |
          echo "Benchmarking build time..."
          time cargo build --release --all-features
          
      - name: Binary size check
        run: |
          cargo build --release
          ls -lah target/release/awtopt* || echo "Binary not found"

  # Dependency analysis  
  dependency-analysis:
    name: Dependency Analysis  
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-outdated
        run: cargo install --locked cargo-outdated

      - name: Check for outdated dependencies
        working-directory: ./AWTOPT/src-tauri  
        run: cargo outdated --exit-code 1 || echo "Some dependencies are outdated"

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: Check license compatibility
        working-directory: ./AWTOPT/src-tauri
        continue-on-error: true
        run: cargo deny --log-level error check licenses

      - name: Check for security advisories  
        working-directory: ./AWTOPT/src-tauri
        continue-on-error: true
        run: cargo deny --log-level error check advisories

      - name: Frontend dependency check
        working-directory: ./AWTOPT
        continue-on-error: true
        run: |
          npm audit --audit-level high
          npx npm-check-updates --doctor || echo "Some npm packages could be updated"

  # CODE QUALITY METRICS
  quality-metrics:
    name: Quality Metrics
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./AWTOPT/src-tauri
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust  
        uses: dtolnay/rust-toolchain@stable

      - name: Install tokei (line counter)
        run: cargo install tokei

      - name: Code statistics
        run: |
          echo "Code Quality Metrics"
          echo "=================="
          tokei . --exclude target
          echo ""
          echo "Rust specific metrics:"  
          find src -name "*.rs" -exec wc -l {} + | tail -1 | awk '{print "Total Rust lines: " $1}'
          find src -name "*.rs" | wc -l | awk '{print "Rust files count: " $1}'

      - name: Clippy detailed analysis
        run: |
          echo "Detailed Clippy Analysis"
          echo "====================="
          cargo clippy --all-targets --all-features -- -W clippy::all -W clippy::pedantic -A clippy::module_name_repetitions -A clippy::too_many_lines

  # Integration quality summary
  quality-summary:
    name: Quality Summary  
    runs-on: ubuntu-latest
    needs: [coverage, benchmark, dependency-analysis, quality-metrics]
    if: always()
    
    steps:
      - name: Generate quality report
        run: |
          echo "Code Quality Summary"
          echo "=================="
          echo ""
          echo "Coverage: ${{ needs.coverage.result }}"
          echo "Benchmarks: ${{ needs.benchmark.result }}"  
          echo "Dependencies: ${{ needs.dependency-analysis.result }}"
          echo "Metrics: ${{ needs.quality-metrics.result }}"
          echo ""
          
          if [[ "${{ needs.coverage.result }}" == "success" && "${{ needs.benchmark.result }}" == "success" && "${{ needs.dependency-analysis.result }}" == "success" && "${{ needs.quality-metrics.result }}" == "success" ]]; then
            echo "All quality checks passed!"
            exit 0
          else
            echo "Some quality checks failed or were skipped"
            exit 1  
          fi