name: Install Tauri Linux Dependencies
description: Install Ubuntu packages required to build Tauri v2 apps

runs:
  using: composite
  steps:
    - name: Install Ubuntu packages
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          curl \
          wget \
          file \
          libssl-dev \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          librsvg2-dev \
          libayatana-appindicator3-dev \
          patchelf \
          libxdo-dev
